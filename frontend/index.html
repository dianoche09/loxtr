      <h1>LOXTR - AI-Powered Global Trade Intelligence Platform</h1>
      <p>LOXTR helps exporters, importers, and distributors digitize and optimize their entire global trade workflow. Headquartered in Ankara, Turkey, LOXTR combines customs compliance automation, AI-driven B2B lead generation, freight rate forecasting, and CRM into a single unified platform.</p>

      <h2>Core Products</h2>

      <h3>LoxConvert - AI Customs Document Analyzer</h3>
      <p>Upload commercial invoices, packing lists, or bills of lading in any format (PDF, image, scan). LoxConvert uses Google Gemini AI vision to extract structured data, classify HS codes, calculate tariff rates and duties for any destination country, and flag compliance risks. Over 95% of Turkish exports fall within the 5,000+ HS codes supported.</p>

      <h3>AI Lead Radar - B2B Buyer Discovery Engine</h3>
      <p>A multi-step AI discovery wizard that generates 10-20 real potential buyer companies for your specific product. Each lead includes company name, website, contact email, match reasoning, and AI confidence score (0-100). Unlike static lead databases, LOXTR generates fresh, contextual leads verified through web scraping.</p>

      <h3>LOX Predict - Freight Rate Forecasting</h3>
      <p>6-month container shipping rate forecasts with 10th-90th percentile confidence intervals. Covers trend analysis, multi-carrier route optimization comparing price, transit time, reliability, and carbon footprint. Powered by Google Gemini market analysis.</p>

      <h3>LOXTR CRM - Trade Sales Automation</h3>
      <p>Purpose-built CRM for international trade featuring list, grid, and kanban views. Includes AI email generation in any language, multi-step campaign automation, smart segments, and supply chain intelligence for each lead.</p>

      <h2>Industry Solutions</h2>
      <p>Specialized trade intelligence for 9 industries: Textile &amp; Apparel, Automotive Parts, Chemicals, Food &amp; Agriculture, Machinery &amp; Equipment, Medical Devices, Construction Materials, Electronics, and Cosmetics. Each includes tailored HS code databases, compliance requirements, and buyer profiles.</p>

      <h2>Pricing</h2>
      <ul>
        <li><strong>Free Plan:</strong> 50 leads/month, 5 LoxConvert analyses/day, basic CRM features</li>
        <li><strong>Pro Plan:</strong> Higher limits, priority AI processing, advanced campaign automation</li>
        <li><strong>Enterprise:</strong> Custom limits, API access, dedicated support</li>
      </ul>

      <h2>Why LOXTR vs Alternatives</h2>
      <ul>
        <li><strong>vs Alibaba/TradeIndia:</strong> LOXTR finds buyers for you using AI instead of listing your products and waiting. AI-scored leads vs. random inquiries.</li>
        <li><strong>vs Traditional customs brokers:</strong> Instant AI document analysis vs. days of manual processing.</li>
        <li><strong>vs Generic CRMs (HubSpot, Salesforce):</strong> Purpose-built for trade with HS codes, tariff calculations, and supply chain intelligence.</li>
        <li><strong>vs Freight marketplaces (Freightos, Flexport):</strong> LOXTR covers the full trade cycle from buyer finding to shipping.</li>
      </ul>
